version: "3.8"

services:
  # ══════ Databases ══════
  postgres-users:
    image: postgres:16-alpine
    container_name: postgres-users
    environment:
      POSTGRES_DB: tsuskills_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg-users-data:/var/lib/postgresql/data
    networks:
      - tsuskills
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-vacancies:
    image: postgres:16-alpine
    container_name: postgres-vacancies
    environment:
      POSTGRES_DB: tsuskills_vacancies
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pg-vacancies-data:/var/lib/postgresql/data
    networks:
      - tsuskills
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-skills:
    image: postgres:16-alpine
    container_name: postgres-skills
    environment:
      POSTGRES_DB: tsuskills_skills
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pg-skills-data:/var/lib/postgresql/data
    networks:
      - tsuskills
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_SECURITY_PLUGIN=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - tsuskills

  # ══════ Services ══════
  users-service:
    build:
      context: ../users
      dockerfile: docker/Dockerfile
    container_name: users-service
    environment:
      CONFIG_FILE_PATH: config/config.docker.yaml
    ports:
      - "8081:8081"
    depends_on:
      postgres-users:
        condition: service_healthy
    networks:
      - tsuskills

  dbmanager-service:
    build:
      context: ../dbmanager
      dockerfile: docker/Dockerfile
    container_name: dbmanager-service
    environment:
      CONFIG_FILE_PATH: config/config.docker.yaml
    ports:
      - "8080:8080"
    depends_on:
      postgres-vacancies:
        condition: service_healthy
      opensearch:
        condition: service_started
    networks:
      - tsuskills

  skills-service:
    build:
      context: ../skills
      dockerfile: docker/Dockerfile
    container_name: skills-service
    environment:
      CONFIG_FILE_PATH: config/config.docker.yaml
    ports:
      - "8082:8082"
    depends_on:
      postgres-skills:
        condition: service_healthy
    networks:
      - tsuskills

  # ══════ Gateway ══════
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gateway
    environment:
      CONFIG_FILE_PATH: config/config.docker.yaml
    ports:
      - "8000:8000"
    depends_on:
      - users-service
      - dbmanager-service
      - skills-service
    networks:
      - tsuskills

volumes:
  pg-users-data:
  pg-vacancies-data:
  pg-skills-data:
  opensearch-data:

networks:
  tsuskills:
    driver: bridge
